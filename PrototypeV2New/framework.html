<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>3D Medicine Rack - Manual Mode</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: Arial;
        }

        #hud {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(255, 255, 255, 0.9);
            padding: 10px;
            border-radius: 6px;
            font-size: 14px;
        }

        #controlPanel {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: white;
            padding: 12px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.2);
        }

        #controlPanel select,
        #controlPanel input {
            margin-right: 5px;
            padding: 4px;
        }

        #controlPanel button {
            padding: 5px 10px;
            cursor: pointer;
        }
    </style>
</head>

<body>

    <div id="hud"></div>

    <div id="controlPanel">
        <select id="actionType">
            <option value="delivery">Tambah Stok</option>
            <option value="order">Beli Obat</option>
        </select>

        <select id="boxSelect"></select>

        <input type="number" id="quantityInput" placeholder="Jumlah" min="1">

        <button id="submitBtn">Submit</button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
    <script src="rack.js"></script>

    <script>
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xf2f2f2);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 6, 9);
        camera.lookAt(0, 2.5, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0xffffff, 0.6));
        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(5, 10, 5);
        scene.add(dirLight);

        // Create Rack
        const { rackGroup, boxObjects } = createMedicineRack();
        scene.add(rackGroup);

        // Worker visuals
        createWorkerShadow(scene);
        createSearchIndicator(scene);

        // Populate dropdown
        const boxSelect = document.getElementById("boxSelect");
        boxObjects.forEach(box => {
            const option = document.createElement("option");
            option.value = box.id;
            option.textContent = box.id;
            boxSelect.appendChild(option);
        });

        // Manual Action
        async function processManualAction(action, boxId, qty) {

            if (rackOccupied) return;

            const box = boxObjects.find(b => b.id === boxId);
            if (!box) return;

            if (action === "delivery") {

                await simulateSearch(arrivalWorker, [boxId], boxObjects);

                for (let i = 0; i < qty; i++) {
                    if (box.count < box.capacity)
                        box.count++;
                }

                lastDeliverySummary = `${qty} ${boxId}`;

            } else if (action === "order") {

                await simulateSearch(orderWorker, [boxId], boxObjects);

                let fulfilled = 0;
                while (fulfilled < qty && box.count > 0) {
                    box.count--;
                    fulfilled++;
                }

                lastOrderSummary = `${fulfilled}/${qty} ${boxId}`;
            }

            updateBoxes(boxObjects);
            updateHUD();
        }

        document.getElementById("submitBtn").addEventListener("click", () => {

            const action = document.getElementById("actionType").value;
            const boxId = document.getElementById("boxSelect").value;
            const qty = parseInt(document.getElementById("quantityInput").value);

            if (!qty || qty <= 0) {
                alert("Masukkan jumlah yang valid!");
                return;
            }

            processManualAction(action, boxId, qty);
        });

        function updateHUD() {
            let html = `<strong>Runtime:</strong> ${simulationTime.toFixed(1)}s<br><br>`;
            html += `<strong>Last Delivery:</strong> ${lastDeliverySummary}<br>`;
            html += `<strong>Last Order:</strong> ${lastOrderSummary}<br><br>`;
            boxObjects.forEach(b => {
                html += `${b.id}: ${b.count}/${b.capacity}<br>`;
            });
            document.getElementById("hud").innerHTML = html;
        }

        setInterval(() => { tickSimulation(0.1); updateHUD(); }, 100);

        window.addEventListener("resize", () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        function animate() {
            requestAnimationFrame(animate);
            renderer.render(scene, camera);
        }

        updateHUD();
        animate();
    </script>

</body>

</html>
