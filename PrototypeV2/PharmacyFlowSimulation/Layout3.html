<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title>3D Medicine Rack</title>
        <style>
            body
            {
                margin:0;
                overflow:hidden;
                font-family:Arial;
            }
            #toggleHUD
            {
                padding:6px 10px;
                border:none;
                border-radius:6px;
                background:#444;
                color:white;
                cursor:pointer;
            }
            #buttonTog
            {
                position:absolute;
                top:10px;
                left:10px;
            }
            #buttonTog:hover
            {
                opacity:0.8;
            }
            #hud
            {
                position:absolute;
                top:50px;
                left:10px;
                background:rgba(255,255,255,0.9);
                padding:10px;
                border-radius:6px;
                font-size:14px;
            }
            #mt
            {
                text-align:center;
                font-size:medium;
            }
            /* #saveDataBtn
            {
                position: absolute;
                top: 20px;
                right: 20px;
                padding: 10px 16px;
                font-size: 14px;
                background-color: #2e86de;
                color: white;
                border: none;
                border-radius: 6px;
                cursor: pointer;
            }

            #saveDataBtn:hover
            {
                background-color: #1b4f72;
            } */
        </style>
    </head>
    <body>
        <div id="buttonTog">
            <button id="toggle">Toggle HUD</button>
            <button id="auto">Start Auto</button>
            <button id="peak" disabled>Peak Hours</button>
            <button id="hitbox">Hitbox Debug</button>
        </div>
        <div id="hud"></div>
        <script src="https://cdn.jsdelivr.net/npm/three@0.160.1/build/three.min.js"></script>
        <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
        <script src="camera.js"></script>
        <script src="rack.js"></script>
        <script src="worker_V2.js"></script>
        <script src="movement_V2.js"></script>
        <script src="environment.js"></script>
        <script src="functions_V2.js"></script>
        <script src="dataCollector_V2.js"></script>
        <script>
            const scene = new THREE.Scene();
            //const axesHelper = new THREE.AxesHelper(5); scene.add(axesHelper);
            //above is WorldCentralPositiveAxis_ShowFunc, x is red, y is green, z is blue
            //const gridHelper = new THREE.GridHelper(100, 100); scene.add(gridHelper); //GridFloor_ShowFunc
            const floorGeo = new THREE.BoxGeometry(61, 0.05, 31);
            const floorMat = new THREE.MeshStandardMaterial({ color: 0xffffff });
            const floor = new THREE.Mesh(floorGeo, floorMat);
            floor.position.set(0, -0.025, 0);
            scene.add(floor);
            scene.background = new THREE.Color(0xf2f2f2);
            const camera = new THREE.PerspectiveCamera(60,window.innerWidth/window.innerHeight,0.1,100);
            camera.position.set(0,6,9);
            camera.lookAt(0,2.5,0);
            const renderer = new THREE.WebGLRenderer({antialias:true});
            renderer.setSize(window.innerWidth,window.innerHeight);
            document.body.appendChild(renderer.domElement);
            camMovements(camera, renderer);
            scene.add(new THREE.AmbientLight(0xffffff,0.6));
            const dirLight=new THREE.DirectionalLight(0xffffff,0.8);
            dirLight.position.set(5,10,5);
            scene.add(dirLight);
            //NOTE: TOTAL AREA IS 60x30 (XxZ) from center (aka -30 to 30 and -15 to 15)
            //however there is wall thickness 0.5 from wall line
            //X axis walls (1-5)
            const wall1 = createWall(60,8); const wall2 = createWall(46,8);
            const wall3 = createWall(4,3.75); const wall4 = createWall(5,8);
            const wall5 = createWall(2,8); //For door which is x = 3
            wall1.wallGroup.position.set(0, 0, -15); wall2.wallGroup.position.set(-7, 0, 15);
            wall3.wallGroup.position.set(18, 0, 15); wall4.wallGroup.position.set(22.5, 0, 15);
            wall5.wallGroup.position.set(29, 0, 15);
            scene.add(wall1.wallGroup); scene.add(wall2.wallGroup);
            scene.add(wall3.wallGroup); scene.add(wall4.wallGroup); scene.add(wall5.wallGroup);
            //Z axis walls (6-7)
            const wall6 = createWall(31,8); const wall7 = createWall(31,8); //Add 1 to make edges visible
            wall6.wallGroup.rotation.y = Math.PI/2; wall7.wallGroup.rotation.y = Math.PI/2;
            wall6.wallGroup.position.set(-30, 0, 0); wall7.wallGroup.position.set(30, 0, 0);
            scene.add(wall6.wallGroup); scene.add(wall7.wallGroup);
            //Storage Area (8-10)
            const wall8 = createWall(13.5,8); wall8.wallGroup.position.set(23, 0, 0); scene.add(wall8.wallGroup);
            const wall9 = createWall(12,8); wall9.wallGroup.rotation.y = Math.PI/2;
            wall9.wallGroup.position.set(16.5, 0, -9.5); scene.add(wall9.wallGroup);
            const wall10 = createWall(1,8); wall10.wallGroup.rotation.y = Math.PI/2;
            wall10.wallGroup.position.set(16.5, 0, 0); scene.add(wall10.wallGroup);
            //Rack
            const racks = [];
            //Here be medicine rack
            // --- BAGIAN LAYOUT BARU ---
            // --- LAYOUT POJOK KIRI ATAS ---
            // --- LAYOUT POJOK KIRI ATAS ---
            // --- LAYOUT DUA LORONG BERHADAPAN (POJOK KIRI ATAS) ---
            // --- LAYOUT BACK-TO-BACK (LORONG GANDA) ---
            const rack = [];

            // BARIS 1 & 2 (LORONG PERTAMA - Kiri)
            // Baris 1: Menempel dinding kiri, menghadap Kanan
            const rack1 = createMedicineRack(1); 
            rack1.rackGroup.rotation.y = Math.PI / 2; 
            rack1.rackGroup.position.set(-28.9, 0, -10); 

            const rack2 = createMedicineRack(2); 
            rack2.rackGroup.rotation.y = Math.PI / 2; 
            rack2.rackGroup.position.set(-28.9, 0, -5); 

            // Baris 2: Berhadapan dengan Baris 1, menghadap Kiri
            const rack3 = createMedicineRack(3); 
            rack3.rackGroup.rotation.y = -Math.PI / 2; 
            rack3.rackGroup.position.set(-22, 0, -10); 

            const rack4 = createMedicineRack(4); 
            rack4.rackGroup.rotation.y = -Math.PI / 2; 
            rack4.rackGroup.position.set(-22, 0, -5); 


            // BARIS 3 & 4 (LORONG KEDUA - Kanan)
            // Baris 3: Berdempetan dengan Baris 2 (Membelakangi), menghadap Kanan
            // X disetel ke -20.9 (hanya selisih ~1.1 unit dari Baris 2 untuk efek menempel)
            const rack5 = createMedicineRack(5); 
            rack5.rackGroup.rotation.y = Math.PI / 2; 
            rack5.rackGroup.position.set(-20.9, 0, -10); 

            const rack6 = createMedicineRack(6); 
            rack6.rackGroup.rotation.y = Math.PI / 2; 
            rack6.rackGroup.position.set(-20.9, 0, -5); 

            // Baris 4: Berhadapan dengan Baris 3, menghadap Kiri
            const rack7 = createMedicineRack(7); 
            rack7.rackGroup.rotation.y = -Math.PI / 2; 
            rack7.rackGroup.position.set(-14, 0, -10); 

            const rack8 = createMedicineRack(8); 
            rack8.rackGroup.rotation.y = -Math.PI / 2; 
            rack8.rackGroup.position.set(-14, 0, -5); 

            // Masukkan ke array dan scene
            racks.push(rack1, rack2, rack3, rack4, rack5, rack6, rack7, rack8);
            racks.forEach(r => scene.add(r.rackGroup));
            //Here be Outbound rack
            const outboundRack = createOutboundRack(1); outboundRack.rackGroup.rotation.y = Math.PI;
            outboundRack.rackGroup.position.set(9, 0, 13.95); scene.add(outboundRack.rackGroup);
            racks.push(outboundRack); //So hitbox debug affects it
            const allBoxes = racks.flatMap(r => r.boxObjects);
            window.boxObjects = allBoxes;
            populateLocationDropdown(boxObjects);
            //Workers
            workerPool = initWorkerPool(scene, 4); //Set worker amount here
            const INITIAL_POSITIONS =
            [
                {x:-3,y:0,z:8},
                {x:3,y:0,z:8},
                {x:0,y:0,z:8},
                {x:6,y:0,z:8}//,
                /*{x:-6,y:0,z:8},
                {x:-9,y:0,z:8}//,
                /*{x:-12,y:0,z:8},
                {x:-15,y:0,z:8}*/
            ];
            //Note: setInitialPositions called after buildGrid() below
            //Environment
            const staging = createStagingArea();
            staging.tableGroup.position.set(0, 0, 0);
            scene.add(staging.tableGroup);
            const desk = createComputerDesk(); desk.deskGroup.rotation.y = Math.PI/2;
            desk.deskGroup.position.set(-28.45,0,12.95);
            scene.add(desk.deskGroup);
            const counter = createCounter();
            counter.counterGroup.position.set(18, 0, 13.45); //wallPosition-wallThickness/2-counterDepth/2 and -0.05 adjustment
            scene.add(counter.counterGroup);
            const storageArea = createStorageArea();
            storageArea.storageGroup.position.set(24.5, 0, -9.5); //edges-wallThickness/2
            scene.add(storageArea.storageGroup);
            //Initialization of global variables used in functions
            window.storageArea = storageArea;
            window.desk = desk;
            window.counter = counter;
            window.staging = staging;
            window.outboundRack = outboundRack;
            //Initialize static obstacles
            const allWalls = [wall1, wall2, wall3, wall4, wall5, wall6, wall7, wall8, wall9, wall10];
            window.obstacles = [];
            //Walls — need rotation-aware half-extent swap
            allWalls.forEach(w => {
                const pos = new THREE.Vector3();
                w.hitbox.getWorldPosition(pos);
                const rotated = Math.abs(w.wallGroup.rotation.y) > 0.1; //is PI/2 rotated?
                const { halfX, halfZ } = w.hitbox._collisionSize;
                obstacles.push({ cx: pos.x, cz: pos.z,
                    halfX: rotated ? halfZ : halfX,
                    halfZ: rotated ? halfX : halfZ });
            });
            //Racks
            racks.forEach(r => {
                const pos = new THREE.Vector3();
                r.hitbox.getWorldPosition(pos);
                const rotated = Math.abs(Math.round(r.rackGroup.rotation.y / (Math.PI / 2)) % 2) === 1; // true only for ±90°
                const { halfX, halfZ } = r.hitbox._collisionSize;
                obstacles.push({
                    cx: pos.x, cz: pos.z,
                    halfX: rotated ? halfZ : halfX,
                    halfZ: rotated ? halfX : halfZ,
                });
            });
            //Staging table
            const stagingPos = new THREE.Vector3();
            staging.hitbox.getWorldPosition(stagingPos);
            obstacles.push({ cx: stagingPos.x, cz: stagingPos.z,
                halfX: staging.hitbox._collisionSize.halfX,
                halfZ: staging.hitbox._collisionSize.halfZ });
            //Computer desk, use walls rotation awareness calc
            const deskPlace = new THREE.Vector3();
            desk.hitbox.getWorldPosition(deskPlace);
            const deskRotated = Math.abs(desk.deskGroup.rotation.y) > 0.1;
            const deskCS = desk.hitbox._collisionSize;
            obstacles.push({ cx: deskPlace.x, cz: deskPlace.z,
                halfX: deskRotated ? deskCS.halfZ : deskCS.halfX,
                halfZ: deskRotated ? deskCS.halfX : deskCS.halfZ });
            //Counter
            const counterPlace = new THREE.Vector3();
            counter.hitbox.getWorldPosition(counterPlace);
            obstacles.push({ cx: counterPlace.x, cz: counterPlace.z,
                halfX: counter.hitbox._collisionSize.halfX,
                halfZ: counter.hitbox._collisionSize.halfZ });
            //HUD
            let lastFrameTime = performance.now();
            let fps = 0;
            let simulationTime = 0;
            function updateHUD()
            {
                let html = `<strong>FPS:</strong> ${fps.toFixed(1)}<br>`;
                html += `<strong>Runtime:</strong> ${
                simulationTime = automationRunning ? ((performance.now() - dataCollector.startTime) / 1000).toFixed(2) : simulationTime
                }s<br><br>`;
                html += `${workerPool.getStatusHTML()}<br><br>`;
                html += `<strong>Flow Queue</strong> (${flowQueue.pendingCount} pending, ${flowQueue.failedCount} expired):<br>`;
                html += flowQueue.getStatusHTML() + '<br><br>';
                //html += `<strong>Overflow Queue:</strong> ${overflowQueue.map(o=>o.id+"("+o.qty+")").join(", ") || "Empty"}<br><br>`;
                //allBoxes.forEach(b=>{ html += `${b.id}: ${b.count}/${b.capacity}<br>`; });
                if (peakHoursActive && peakStartedAt !== null)
                {
                    const elapsedSimMin  = ((performance.now() - peakStartedAt) / 1000 * SIM_SPEED / 60).toFixed(1);
                    const remainingSimMin = Math.max(0, PEAK_HOURS_SIM_MIN - elapsedSimMin).toFixed(1);
                    html += `<strong style="color:orange"> PEAK HOURS — ${remainingSimMin} sim-min left</strong><br><br>`;
                }
                if(!hudVisible) return;
                document.getElementById("hud").innerHTML = html;
            }
            //Toggles or Buttons
            let hudVisible = true;
            document.getElementById("toggle").addEventListener("click", () =>
            { hudVisible = !hudVisible; document.getElementById("hud").style.display = hudVisible ? "block" : "none"; });
            let automationRunning = false;
            document.getElementById("auto").addEventListener("click", () =>
            {
                if (automationRunning)
                {
                    automationRunning = false;
                    document.getElementById("auto").textContent = "Start Auto";
                    document.getElementById("peak").disabled = true; //Can't use peak when stopped
                    if (peakHoursActive) deactivatePeakHours(); //Clean up if peak was running
                    exportSimulationData();
                }
                else
                {
                    resetSimulation();
                    automationRunning = true;
                    document.getElementById("peak").disabled = false;
                    document.getElementById("auto").textContent = "Stop Auto";
                }
            });
            function resetSimulation()
            {
                if (peakHoursActive) deactivatePeakHours();
                simulationTime = 0;
                dataCollector.clear();
                flowQueue.clear();
                customerQueue.clear();
                overflowQueue.length = 0;
                pendingSupplier.clear();
                resetTileOccupants();
                workerPool.resetAll(INITIAL_POSITIONS);
                workerPool.workers.forEach(w => occupyInitialTile(w));
                console.log("[SIM] Simulation reset");
            }
            function activatePeakHours()
            {
                if (!automationRunning || peakHoursActive) return;
                peakHoursActive = true;
                peakStartedAt = performance.now();
                dataCollector.peakHoursActive = true; 
                document.getElementById("peak").disabled = true;
                document.getElementById("peak").textContent = "Peak Hours (Active)";
                dataCollector.logEvent("system", null, "peak hours started", []);
                console.log("[PEAK] Peak hours activated");
                //Halve both interval cadences by clearing and recreating them
                clearInterval(enqueueInterval);
                clearInterval(dispatchInterval);
                enqueueInterval = setInterval(() => { if(automationRunning) enqueueWeightedRandom(); }, 3500); //Refer to functions file
                dispatchInterval = setInterval(() => { if (automationRunning) dispatchNextFlow(); }, 1000); //2000/2
                //Auto-deactivate after PEAK_HOURS_IRL_MS
                peakHoursTimeout = setTimeout(() => deactivatePeakHours(), PEAK_HOURS_IRL_MS);
            }
            function deactivatePeakHours()
            {
                if (!peakHoursActive) return;
                peakHoursActive = false;
                peakStartedAt = null;
                dataCollector.peakHoursActive = false;
                if (peakHoursTimeout) { clearTimeout(peakHoursTimeout); peakHoursTimeout = null; }
                document.getElementById("peak").textContent = "Peak Hours";
                document.getElementById("peak").disabled = !automationRunning; // Re-enable only if sim still running
                dataCollector.logEvent("system", null, "peak hours ended", []);
                console.log("[PEAK] Peak hours deactivated");
                //Restore normal cadences
                clearInterval(enqueueInterval);
                clearInterval(dispatchInterval);
                enqueueInterval = setInterval(() => { if(automationRunning) enqueueWeightedRandom(); }, 7000); //Refer to functions file
                dispatchInterval = setInterval(() => { if (automationRunning) dispatchNextFlow(); }, 2000);
            }
            document.getElementById("peak").addEventListener("click", () => {
                if (automationRunning && !peakHoursActive) activatePeakHours();
            });
            let hitboxDebug = false;
            document.getElementById("hitbox").addEventListener("click", () =>
            {
                hitboxDebug = !hitboxDebug;
                workerPool.toggleHitboxes();
                racks.forEach(rack =>
                {
                    rack.hitbox.visible = hitboxDebug;
                    rack.interactionArea.visible = hitboxDebug;
                });
                desk.hitbox.visible = hitboxDebug;
                desk.interactionArea.visible = hitboxDebug;
                counter.hitbox.visible = hitboxDebug;
                counter.interactionArea.visible = hitboxDebug;
                staging.hitbox.visible = hitboxDebug;
                staging.interactionAreas.forEach(ia => ia.visible = hitboxDebug);
                storageArea.interactionArea.visible = hitboxDebug; //No hitbox for rug
                wall1.hitbox.visible = hitboxDebug;
                wall2.hitbox.visible = hitboxDebug;
                wall3.hitbox.visible = hitboxDebug;
                wall4.hitbox.visible = hitboxDebug;
                wall5.hitbox.visible = hitboxDebug;
                wall6.hitbox.visible = hitboxDebug;
                wall7.hitbox.visible = hitboxDebug;
                wall8.hitbox.visible = hitboxDebug;
                wall9.hitbox.visible = hitboxDebug;
                wall10.hitbox.visible = hitboxDebug;
                document.getElementById("hitbox").textContent = hitboxDebug ? "Hide Hitboxes" : "Hitbox Debug";
            });
            //Sim Loops
            let peakHoursActive  = false;
            let peakHoursTimeout = null; //handle for the auto-deactivation setTimeout
            let peakHoursStartTime = null; //timestamp for when peak hours started, used for HUD countdown
            let enqueueInterval  = null; //handle for the replaceable enqueue setInterval
            let dispatchInterval = null; //handle for the replaceable dispatch setInterval
            enqueueInterval = setInterval(() => { if(automationRunning) enqueueWeightedRandom(); }, 7000); //Refer to functions file
            setInterval(async ()=> { 
                if(automationRunning && workerPool.workers.some(w=>!w.busy)) await workerPool.repositionAllIdle(); },8000);
            setInterval(()=> { if(automationRunning) checkReorderTriggers(allBoxes); },100); //Failsafe1 checker
            //setInterval(()=> { if(automationRunning) processOverflow(allBoxes); },2000); //Failsafe2: Too much stock, may be removed
            dispatchInterval = setInterval(()=> { if(automationRunning) dispatchNextFlow();}, 2000); //Unified Dispather
            setInterval(()=> { if(automationRunning) dataCollector.logFPS(fps); },2000); //FPS Tracking, per 2 seconds
            setInterval(()=> { updateHUD(); },100); //HUD Update
            setInterval(() => { if (automationRunning) dataCollector.logHeatmap();}, 5000); //5 real secs = every 5 sim-min interval
            //Resize
            window.addEventListener("resize",()=>{
            camera.aspect=window.innerWidth/window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth,window.innerHeight);
            });
            //TILE GRID
            buildGrid();
            initDoorwayTiles();
            initTransitTiles();
            //Layout-specific rack corridor transit tiles for this layout
            //Right corridor (racks 5-8, only path to staging from east rack pair)
            [-10, -8, -6, -4, -2].forEach(z => markTransitTile(-17, z));
            //Left corridor (racks 1-4)
            [-10, -8, -6, -4, -2].forEach(z => markTransitTile(-25, z));
            //Cross corridor safeguard
            [-10, -8, -2].forEach(z => { markTransitTile(-19, z); markTransitTile(-21, z); });
            // --- HARD BLOCK STORAGE WALLS (prevents A* phasing through) ---
            markBlockedArea(16.5, 30, -1, 1); // Wall 8 (top horizontal)
            markBlockedArea(15.5, 17.5, -15, -4); // Wall 9 (left vertical)
            markBlockedArea(15.5, 17.5, -1, 1); // Wall 10 (door stub)
            markBlockedArea(-22.9, -20.4, -12.4,  -7.7); // rack3+rack5 combined (back-to-back, touching)
            markBlockedArea(-22.9, -20.4,  -7.3,  -2.7); // rack4+rack6 combined (back-to-back, touching)
            markBlockedArea(-14.9, -13.1, -12.4,  -7.7); // rack7
            markBlockedArea(-14.9, -13.1,  -7.3,  -2.7); // rack8
            //createTileDebug(scene); //Tile debug
            //Register all interaction areas — must be after buildGrid() and obstacles are set
            //Medicine racks
            racks.slice(0, 8).forEach((rack, i) => {
                const p = new THREE.Vector3();
                rack.interactionArea.getWorldPosition(p);
                registerIA('rack_' + (i + 1), p.x, p.z);
            });
            //Outbound rack
            const outboundIAPos = new THREE.Vector3();
            outboundRack.interactionArea.getWorldPosition(outboundIAPos);
            registerIA('outbound', outboundIAPos.x, outboundIAPos.z);
            //Desk
            const deskIAPos = new THREE.Vector3();
            desk.interactionArea.getWorldPosition(deskIAPos);
            registerIA('desk', deskIAPos.x, deskIAPos.z);
            //Counter
            const counterIAPos = new THREE.Vector3();
            counter.interactionArea.getWorldPosition(counterIAPos);
            registerIA('counter', counterIAPos.x, counterIAPos.z);
            //Storage area
            const storageIAPos = new THREE.Vector3();
            storageArea.interactionArea.getWorldPosition(storageIAPos);
            registerIA('storage', storageIAPos.x, storageIAPos.z);
            //Staging (6 IAs)
            staging.interactionAreas.forEach((ia, i) => {
                const p = new THREE.Vector3();
                ia.getWorldPosition(p);
                registerIA('staging_' + i, p.x, p.z);
            });
            //Place workers and mark starting tiles
            workerPool.setInitialPositions(INITIAL_POSITIONS);
            workerPool.workers.forEach(w => occupyInitialTile(w));
            //Animating
            function animate()
            {
                const now = performance.now();
                const dt = now - lastFrameTime;
                fps = dt > 0 ? 1000 / dt : fps;
                lastFrameTime = now;
                requestAnimationFrame(animate);
                renderer.render(scene,camera);
                moveTarget(camera);
            }
            updateHUD();
            animate();

            // document.getElementById("saveDataBtn").addEventListener("click", () =>
            // {
            //     const data = dataCollector.getData();
            //     console.table(data);
            // });
            /*
            document.getElementById("saveDataBtn").addEventListener("click", () =>
            {
                exportSimulationData();
            });
            */
            function exportSimulationData()
            {
                const data = dataCollector.getData();

                if(data.length === 0)
                {
                    alert("No simulation data to export.");
                    return;
                }

                /*
                //Tambah nomor urut
                const numberedData = data.map((row, index) => ({
                    No: index + 1,
                    time: row.time,
                    event: row.event,
                    worker: row.worker,
                    item: row.item,
                    rack: row.rack
                }));
                */
                //Newer detailed format
                const numberedData = data.map((row, index) => ({
                    No: index + 1,
                    runtime: row.runtime,
                    time_min: row.time_min,
                    situation: row.situation,
                    flow_type: row.flow_type,
                    worker: row.worker,
                    activity: row.activity,
                    items: row.items
                }));

                const worksheet = XLSX.utils.json_to_sheet(numberedData);

                const workbook = XLSX.utils.book_new();
                XLSX.utils.book_append_sheet(workbook, worksheet, "Simulation Data");

                const fpsSheet = XLSX.utils.json_to_sheet(dataCollector.fpsRecords);
                XLSX.utils.book_append_sheet(workbook, fpsSheet, "FPS Log");

                const customerSheet = XLSX.utils.json_to_sheet(
                    dataCollector.customerRecords.map((r, i) => ({ No: i + 1, ...r }))
                    );
                XLSX.utils.book_append_sheet(workbook, customerSheet, "Customer Log");

                const errorSheet = XLSX.utils.json_to_sheet(
                    dataCollector.errorRecords.map((r, i) => ({ No: i + 1, ...r }))
                );
                XLSX.utils.book_append_sheet(workbook, errorSheet, "Error Log");

                const heatmapSheet = XLSX.utils.json_to_sheet(
                    dataCollector.heatmapRecords.map((r, i) => ({ No: i + 1, ...r }))
                );
                XLSX.utils.book_append_sheet(workbook, heatmapSheet, "Heatmap Log");

                const movementSheet = XLSX.utils.json_to_sheet(
                    dataCollector.movementRecords.map((r, i) => ({ No: i + 1, ...r }))
                );
                XLSX.utils.book_append_sheet(workbook, movementSheet, "Movement Log");

                XLSX.writeFile(workbook, "pharmacy_simulation.xlsx");
            }
        </script>
    </body>
</html>
